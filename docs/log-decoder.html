<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>madOS Installer Log Decoder</title>
    <style>
        :root {
            --nord0: #2e3440;
            --nord1: #3b4252;
            --nord2: #434c5e;
            --nord3: #4c566a;
            --nord4: #d8dee9;
            --nord5: #e5e9f0;
            --nord6: #eceff4;
            --nord7: #8fbcbb;
            --nord8: #88c0d0;
            --nord9: #81a1c1;
            --nord10: #5e81ac;
            --nord11: #bf616a;
            --nord12: #d08770;
            --nord14: #a3be8c;
            --nord15: #b48ead;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--nord0);
            color: var(--nord4);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: var(--nord8);
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: var(--nord1);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        #result {
            background: var(--nord0);
            border: 2px solid var(--nord2);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .error {
            color: var(--nord11);
        }

        .warning {
            color: var(--nord12);
        }

        .ok {
            color: var(--nord14);
        }

        .progress {
            color: var(--nord8);
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding: 12px;
            background: var(--nord0);
            border-radius: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--nord8);
        }

        .stat-label {
            font-size: 12px;
            color: var(--nord3);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: var(--nord3);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>madOS Installer Log Decoder</h1>
        
        <div class="card" id="result-card">
            <label>Installation Summary:</label>
            <div id="result">
                <span style="color: var(--nord3);">Scanning QR code or loading...</span>
            </div>
        </div>

        <div class="card" id="stats-card" style="display: none;">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="stat-steps">0</div>
                    <div class="stat-label">Steps</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="stat-errors">0</div>
                    <div class="stat-label">Errors</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="stat-warnings">0</div>
                    <div class="stat-label">Warnings</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="stat-ok">0</div>
                    <div class="stat-label">OK</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>madOS Installer Log Decoder</p>
    </div>

    <script>
        async function decodeInput(input) {
            const resultDiv = document.getElementById('result');
            const statsCard = document.getElementById('stats-card');

            if (!input) {
                resultDiv.innerHTML = '<span style="color: var(--nord3);">No log data found in URL.</span>';
                statsCard.style.display = 'none';
                return;
            }

            try {
                let base64 = input.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4 !== 0) {
                    base64 += '=';
                }
                
                const binaryString = atob(base64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                writer.write(bytes);
                writer.close();
                
                const result = await new Response(ds.readable).text();
                displayResult(result, resultDiv, statsCard);
            } catch (e) {
                resultDiv.innerHTML = `<span class="error">Failed to decode: ${escapeHtml(e.message)}</span>`;
                statsCard.style.display = 'none';
            }
        }

        function displayResult(decoded, resultDiv, statsCard) {
            let html = '';
            let errors = 0, warnings = 0, okCount = 0, steps = 0;

            decoded.split('\n').forEach(line => {
                if (!line.trim()) return;
                
                let cssClass = '';
                if (line.includes('[ERROR]') || line.includes('[FATAL]')) {
                    cssClass = 'error';
                    errors++;
                } else if (line.includes('WARNING')) {
                    cssClass = 'warning';
                    warnings++;
                } else if (line.startsWith('[OK]')) {
                    cssClass = 'ok';
                    okCount++;
                } else if (line.match(/\[PROGRESS \d+\/\d+\]/)) {
                    cssClass = 'progress';
                    steps++;
                }

                html += `<div class="${cssClass}">${escapeHtml(line)}</div>`;
            });

            resultDiv.innerHTML = html;
            statsCard.style.display = 'block';

            document.getElementById('stat-steps').textContent = steps;
            document.getElementById('stat-errors').textContent = errors;
            document.getElementById('stat-warnings').textContent = warnings;
            document.getElementById('stat-ok').textContent = okCount;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onload = function() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const decodedHash = decodeURIComponent(hash);
                decodeInput(decodedHash);
            } else {
                document.getElementById('result').innerHTML = '<span style="color: var(--nord3);">No QR data found. Scan a madOS installation log QR code.</span>';
            }
        };
    </script>
</body>
</html>
