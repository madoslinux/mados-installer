repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: tests
        name: Run tests
        entry: python3 -m unittest discover -s tests -v
        language: system
        pass_filenames: false
        stages: [pre-commit]