name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: List files
        run: |
          echo "=== Files in repo ==="
          ls -la
          echo "=== Python version ==="
          python3 --version

      - name: Check Python syntax
        run: python3 -m py_compile pages/*.py

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          echo "=== Installing shellcheck ==="
          which shellcheck || (apt-get update && apt-get install -y shellcheck)

      - name: Run shellcheck
        run: |
          echo "=== Shell scripts ==="
          ls scripts/
          shellcheck scripts/*.sh || true