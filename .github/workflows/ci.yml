name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-gdkpixbuf-2.0

      - name: Python version
        run: python3 --version

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Run syntax check
        run: python3 -m py_compile pages/*.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: for f in scripts/*.sh; do bash -n "$f"; done